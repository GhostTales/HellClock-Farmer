name: Tauri Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  push:
    tags:
      - 'v*'   # Matches v1.0.0

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: '--bundles appimage,deb,rpm'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: "farming tool"
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "farming tool"
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "HellClock Farmer ${{ github.ref_name }}"
          draft: true

      - name: Upload artifacts for manual download
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.platform }}
          path: |
            farming tool/src-tauri/target/release/bundle/appimage/*.AppImage
            farming tool/src-tauri/target/release/bundle/msi/*.msi
            farming tool/src-tauri/target/release/bundle/deb/*.deb